<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e2a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Космо-Полёт</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="stage">
      <canvas id="game"></canvas>

      <!-- HUD -->
      <div id="hud" class="hidden">
        <button id="btn-pause" class="hud-btn" aria-label="Пауза">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <rect x="6" y="4" width="4.2" height="16" rx="1.2"/>
            <rect x="13.8" y="4" width="4.2" height="16" rx="1.2"/>
          </svg>
        </button>
        <div id="hud-score">0</div>
        <div id="hud-best">Рекорд: 0</div>
      </div>

      <!-- Стартовый экран -->
      <div id="screen-start" class="screen">
        <h1 class="title">КОСМО<br>ПОЛЁТ</h1>
        <div class="best-line">Рекорд: <span id="start-best">0</span></div>
        <div class="hint">Нажми, чтобы лететь</div>
        <div class="btn-stack">
          <button id="btn-mode-endless" class="btn btn-primary">ИГРАТЬ</button>
        </div>
        <div class="settings-row">
          <button id="btn-sound" class="icon-btn" aria-label="Звук">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M3 10v4h4l5 5V5L7 10H3z"/>
              <path d="M16 12c0-1.77-1-3.29-2.5-4.03v8.05c1.5-.73 2.5-2.25 2.5-4.02z"/>
              <path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
          </button>
          <button id="btn-vibration" class="icon-btn" aria-label="Вибрация">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M0 9v6h2V9H0zm3-2v10h2V7H3zm19 2v6h2V9h-2zm-3-2v10h2V7h-2zM16.5 3h-9C6.67 3 6 3.67 6 4.5v15c0 .83.67 1.5 1.5 1.5h9c.83 0 1.5-.67 1.5-1.5v-15c0-.83-.67-1.5-1.5-1.5zM16 19H8V5h8v14z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Экран проигрыша -->
      <div id="screen-gameover" class="screen hidden">
        <h2 class="screen-title">ПРОИГРЫШ</h2>
        <div id="gameover-newrecord" class="record-flash hidden">Новый рекорд!</div>
        <div class="score-big">
          <div class="score-label">Очки</div>
          <div id="gameover-score" class="score-value">0</div>
        </div>
        <div class="best-line">Рекорд: <span id="gameover-best">0</span></div>
        <div class="btn-stack">
          <button id="btn-revive" class="btn btn-primary">▶ ПРОДОЛЖИТЬ ЗА РЕКЛАМУ</button>
          <button id="btn-restart" class="btn btn-secondary">↻ ИГРАТЬ СНОВА</button>
        </div>
      </div>

      <!-- Экран паузы -->
      <div id="screen-pause" class="screen hidden">
        <h2 class="screen-title">ПАУЗА</h2>
        <div class="btn-stack">
          <button id="btn-resume" class="btn btn-primary">ПРОДОЛЖИТЬ</button>
        </div>
        <div class="settings-row">
          <button id="btn-sound-pause" class="icon-btn" aria-label="Звук">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M3 10v4h4l5 5V5L7 10H3z"/>
              <path d="M16 12c0-1.77-1-3.29-2.5-4.03v8.05c1.5-.73 2.5-2.25 2.5-4.02z"/>
              <path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
          </button>
          <button id="btn-vibration-pause" class="icon-btn" aria-label="Вибрация">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M0 9v6h2V9H0zm3-2v10h2V7H3zm19 2v6h2V9h-2zm-3-2v10h2V7h-2zM16.5 3h-9C6.67 3 6 3.67 6 4.5v15c0 .83.67 1.5 1.5 1.5h9c.83 0 1.5-.67 1.5-1.5v-15c0-.83-.67-1.5-1.5-1.5zM16 19H8V5h8v14z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Отсчёт перед возобновлением игры -->
      <div id="countdown" class="countdown hidden">
        <div id="countdown-num" class="countdown-num">3</div>
      </div>

      <!-- Реклама (mock overlay) -->
      <div id="ad-overlay" class="ad hidden">
        <div class="ad-card">
          <div id="ad-title" class="ad-title">Реклама</div>
          <div id="ad-timer" class="ad-timer">3</div>
          <div class="ad-hint">Закроется автоматически</div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
